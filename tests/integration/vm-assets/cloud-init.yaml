#cloud-config
# Cloud-init user-data for the dnsd integration test VM. Runs once
# on first boot; makes the VM into a self-contained dnsd+VPP box.
#
# All apt + service work happens in runcmd (deterministic order)
# rather than cloud-init's `packages:` stage — otherwise the VPP
# install races the apt repo configuration and fails with "Unable
# to locate package vpp".

hostname: dnsd-test-vm
manage_etc_hosts: true

users:
  - name: root
    plain_text_passwd: dnsd
    lock_passwd: false
    shell: /bin/bash

ssh_pwauth: true

chpasswd:
  expire: false

write_files:
  # enp0s3 (user-net) gets DHCP for SSH; enp0s4 (bridge) stays
  # address-less so VPP's af_xdp plugin can grab it.
  - path: /etc/systemd/network/00-mgmt.network
    content: |
      [Match]
      Name=enp0s3
      [Network]
      DHCP=yes
  - path: /etc/systemd/network/10-wan-noaddr.network
    content: |
      [Match]
      Name=enp0s4
      [Network]
      LinkLocalAddressing=no
      IPv6AcceptRA=no
  # Don't let systemd-resolved steal port 53.
  - path: /etc/systemd/resolved.conf.d/no-stub.conf
    content: |
      [Resolve]
      DNSStubListener=no
  - path: /etc/resolv.conf
    content: |
      nameserver 1.1.1.1
  # Pin VPP to 25.10 so apt prefers fd.io's build over anything
  # else that might end up on the path.
  - path: /etc/apt/preferences.d/vpp
    content: |
      Package: vpp* libvppcom* libvppinfra*
      Pin: version 25.10*
      Pin-Priority: 1000

runcmd:
  # 1. fd.io apt repo. Fetch the key directly (cloud-init's keyid
  #    resolution through keyservers has been flaky) and register
  #    the source with signed-by pointing at it.
  - [bash, -c, "curl -fsSL https://packagecloud.io/fdio/release/gpgkey | gpg --dearmor -o /usr/share/keyrings/fdio-release.gpg"]
  - [bash, -c, "echo 'deb [signed-by=/usr/share/keyrings/fdio-release.gpg] https://packagecloud.io/fdio/release/debian bookworm main' > /etc/apt/sources.list.d/fdio-release.list"]
  - [apt-get, update, -qq]

  # 2. Install VPP + libvppcom now that the repo is configured.
  #    DEBIAN_FRONTEND=noninteractive avoids debconf prompting
  #    on slow consoles.
  - [bash, -c, "DEBIAN_FRONTEND=noninteractive apt-get install -y -qq vpp vpp-plugin-core vpp-plugin-dpdk libvppcom dnsutils"]

  # 3. Kill the vanilla VPP unit — we run VPP under vpp-test.service
  #    with our own config.
  - [bash, -c, "systemctl disable vpp.service || true"]
  - [bash, -c, "systemctl stop vpp.service || true"]

  # 4. Pull our config files + systemd units off the DNSDASSETS ISO
  #    attached alongside the cloud-init seed. Must come before the
  #    `systemctl enable` of our units.
  - [mkdir, -p, /mnt/dnsd-assets, /etc/vpp, /etc/dnsd, /usr/local/bin]
  - [mount, -o, ro, -t, iso9660, LABEL=DNSDASSETS, /mnt/dnsd-assets]
  - [cp, /mnt/dnsd-assets/startup.conf, /etc/vpp/startup.conf]
  - [cp, /mnt/dnsd-assets/vcl.conf,     /etc/vpp/vcl.conf]
  - [cp, /mnt/dnsd-assets/commands.txt, /etc/vpp/commands.txt]
  - [cp, /mnt/dnsd-assets/router.yaml,  /etc/dnsd/router.yaml]
  - [install, -m, "755", /mnt/dnsd-assets/configure-vpp.sh, /usr/local/bin/configure-vpp.sh]
  - [cp, /mnt/dnsd-assets/vpp-test.service, /etc/systemd/system/vpp-test.service]
  - [cp, /mnt/dnsd-assets/dnsd.service,     /etc/systemd/system/dnsd.service]
  - [systemctl, daemon-reload]

  # 5. Enable services + network bits.
  - [systemctl, enable, systemd-networkd]
  - [systemctl, enable, --now, systemd-resolved]
  - [systemctl, enable, vpp-test.service]
  - [systemctl, enable, dnsd.service]

  # 6. Sentinels run-tests.sh / build-vm.sh poll for.
  - [touch, /var/lib/dnsd-test-vm.assets-installed]
  - [touch, /var/lib/dnsd-test-vm.setup-done]
