#cloud-config
# Cloud-init user-data for the dnsd integration test VM. Runs once
# on first boot; makes the VM into a self-contained dnsd + VPP box.
#
# All the real work happens in a single `runcmd` script with
# `set -euo pipefail` so any failure halts cloud-init and the
# sentinels never get touched — build-vm.sh times out visibly
# instead of silently producing a broken golden.

hostname: dnsd-test-vm
manage_etc_hosts: true

# SSH-key auth only. The public key is substituted in by
# build-vm.sh from an ephemeral keypair generated at build time.
# No password path — robust against debian cloud image sshd_config
# quirks around PasswordAuthentication.
users:
  - name: root
    ssh_authorized_keys:
      - __SSH_PUBKEY__
    shell: /bin/bash
disable_root: false
ssh_deletekeys: true

write_files:
  # enp0s3 (user-net) gets DHCP for SSH; enp0s4 (bridge) stays
  # address-less so VPP's af_xdp plugin can grab it.
  - path: /etc/systemd/network/00-mgmt.network
    content: |
      [Match]
      Name=enp0s3
      [Network]
      DHCP=yes
  - path: /etc/systemd/network/10-wan-noaddr.network
    content: |
      [Match]
      Name=enp0s4
      [Network]
      LinkLocalAddressing=no
      IPv6AcceptRA=no
  # Don't let systemd-resolved steal port 53.
  - path: /etc/systemd/resolved.conf.d/no-stub.conf
    content: |
      [Resolve]
      DNSStubListener=no
  - path: /etc/resolv.conf
    content: |
      nameserver 1.1.1.1
  # Pin VPP to 25.10 so apt prefers fd.io's build.
  - path: /etc/apt/preferences.d/vpp
    content: |
      Package: vpp* libvppcom* libvppinfra*
      Pin: version 25.10*
      Pin-Priority: 1000

runcmd:
  # One script so failure halts (set -eu) + output is grouped in
  # cloud-init-output.log. Cloud-init runs runcmd via /bin/sh
  # (dash on Debian) — no pipefail, no bash-isms.
  - |
    #!/bin/sh
    set -eu
    exec 2>&1

    echo "==> mounting assets ISO"
    mkdir -p /mnt/dnsd-assets /etc/vpp /etc/dnsd /usr/local/bin
    mount -o ro -t iso9660 LABEL=DNSDASSETS /mnt/dnsd-assets

    echo "==> installing fd.io apt repo (gpg key pre-baked by build-vm.sh)"
    install -m 644 /mnt/dnsd-assets/fdio-release.gpg \
        /usr/share/keyrings/fdio-release.gpg
    echo 'deb [signed-by=/usr/share/keyrings/fdio-release.gpg] https://packagecloud.io/fdio/release/debian bookworm main' \
        > /etc/apt/sources.list.d/fdio-release.list

    echo "==> apt-get update"
    apt-get update -qq

    echo "==> apt-get install VPP 25.10"
    DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
        vpp vpp-plugin-core vpp-plugin-dpdk libvppcom dnsutils

    echo "==> disabling vanilla vpp.service"
    systemctl disable vpp.service || true
    systemctl stop    vpp.service || true

    echo "==> installing dnsd config + systemd units"
    cp /mnt/dnsd-assets/startup.conf     /etc/vpp/startup.conf
    cp /mnt/dnsd-assets/vcl.conf         /etc/vpp/vcl.conf
    cp /mnt/dnsd-assets/commands.txt     /etc/vpp/commands.txt
    cp /mnt/dnsd-assets/router.yaml      /etc/dnsd/router.yaml
    install -m 755 /mnt/dnsd-assets/configure-vpp.sh \
        /usr/local/bin/configure-vpp.sh
    cp /mnt/dnsd-assets/vpp-test.service /etc/systemd/system/vpp-test.service
    cp /mnt/dnsd-assets/dnsd.service     /etc/systemd/system/dnsd.service
    systemctl daemon-reload

    echo "==> enabling services"
    systemctl enable systemd-networkd
    systemctl enable --now systemd-resolved
    systemctl enable vpp-test.service
    systemctl enable dnsd.service

    echo "==> sentinels"
    touch /var/lib/dnsd-test-vm.assets-installed
    touch /var/lib/dnsd-test-vm.setup-done
    echo "==> setup complete"
