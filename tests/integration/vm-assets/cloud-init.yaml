#cloud-config
# Cloud-init user-data for the dnsd integration test VM. Runs once
# on first boot; makes the VM into a self-contained dnsd+VPP box.

hostname: dnsd-test-vm
manage_etc_hosts: true

# Root login via SSH with a well-known password — this VM is
# throwaway and test-only. Don't expose it beyond the build host.
users:
  - name: root
    plain_text_passwd: dnsd
    lock_passwd: false
    shell: /bin/bash

ssh_pwauth: true

write_files:
  # enp0s3 (user-net) gets DHCP for SSH; enp0s4 (bridge) must stay
  # address-less so VPP's af_xdp plugin can grab it.
  - path: /etc/systemd/network/00-mgmt.network
    content: |
      [Match]
      Name=enp0s3
      [Network]
      DHCP=yes
  - path: /etc/systemd/network/10-wan-noaddr.network
    content: |
      [Match]
      Name=enp0s4
      [Network]
      LinkLocalAddressing=no
      IPv6AcceptRA=no
  # Don't let systemd-resolved steal port 53.
  - path: /etc/systemd/resolved.conf.d/no-stub.conf
    content: |
      [Resolve]
      DNSStubListener=no
  - path: /etc/resolv.conf
    content: |
      nameserver 1.1.1.1
  # Pin VPP before apt install so we get 25.10 specifically.
  - path: /etc/apt/preferences.d/vpp
    content: |
      Package: vpp* libvppcom* libvppinfra*
      Pin: version 25.10*
      Pin-Priority: 1000

apt:
  sources:
    fdio:
      source: "deb https://packagecloud.io/fdio/release/debian bookworm main"
      keyid: 1B1C90F0BD8F7ED72149AAEAD12C66EA1C0DE5F1

package_update: true
package_upgrade: false

packages:
  - vpp
  - vpp-plugin-core
  - vpp-plugin-dpdk
  - libvppcom
  - python3
  - dnsutils

runcmd:
  # 1. Stop the vanilla VPP service that comes with the apt package.
  #    We run VPP under vpp-test.service with our own config instead.
  - [bash, -c, "systemctl disable vpp.service || true"]
  - [bash, -c, "systemctl stop vpp.service || true"]

  # 2. Pull our config files + systemd units off the DNSDASSETS ISO
  #    attached alongside the cloud-init seed. MUST come before
  #    any `systemctl enable` of our units or the enable fails.
  - [mkdir, -p, /mnt/dnsd-assets, /etc/vpp, /etc/dnsd, /usr/local/bin]
  - [mount, -o, ro, -t, iso9660, LABEL=DNSDASSETS, /mnt/dnsd-assets]
  - [cp, /mnt/dnsd-assets/startup.conf, /etc/vpp/startup.conf]
  - [cp, /mnt/dnsd-assets/vcl.conf,     /etc/vpp/vcl.conf]
  - [cp, /mnt/dnsd-assets/commands.txt, /etc/vpp/commands.txt]
  - [cp, /mnt/dnsd-assets/router.yaml,  /etc/dnsd/router.yaml]
  - [install, -m, "755", /mnt/dnsd-assets/configure-vpp.sh, /usr/local/bin/configure-vpp.sh]
  - [cp, /mnt/dnsd-assets/vpp-test.service, /etc/systemd/system/vpp-test.service]
  - [cp, /mnt/dnsd-assets/dnsd.service,     /etc/systemd/system/dnsd.service]
  - [systemctl, daemon-reload]

  # 3. Enable the services + network bits. vpp-test comes up
  #    automatically on next boot; dnsd waits on it (Requires=).
  - [systemctl, enable, systemd-networkd]
  - [systemctl, enable, --now, systemd-resolved]
  - [systemctl, enable, vpp-test.service]
  - [systemctl, enable, dnsd.service]

  # 4. Sentinels run-tests.sh polls for.
  - [touch, /var/lib/dnsd-test-vm.assets-installed]
  - [touch, /var/lib/dnsd-test-vm.setup-done]
