#
# Minimal VPP config for the dnsd integration test VM.
#
# We only need:
#   - One dataplane interface (the virtio-net from the bridge, via
#     af_xdp — so VPP and the kernel can share the NIC without
#     DPDK/rebind).
#   - The session layer enabled + app-socket-api so vcl-rs can
#     connect.
#   - CLI + API sockets at well-known paths the tests can talk to.
#

unix {
  nodaemon
  log /var/log/vpp/vpp.log
  full-coredump
  cli-listen /run/vpp/cli.sock
  gid vpp
  exec /etc/vpp/commands.txt
}

api-trace {
  on
}

api-segment {
  gid vpp
}

socksvr {
  socket-name /run/vpp/api.sock
  default
}

cpu {
  main-core 0
}

plugins {
  plugin af_xdp_plugin.so { enable }
  plugin dpdk_plugin.so { disable }
  plugin acl_plugin.so { disable }
  plugin nat_plugin.so { disable }
}

statseg {
  socket-name /run/vpp/stats.sock
}

# VCL session layer — required for vcl-rs to connect, and therefore
# required for dnsd to bind any listener.
session {
  enable
  use-app-socket-api
  evt_qs_memfd_seg
}

buffers {
  buffers-per-numa 65536
  default data-size 2048
}
