#
# Minimal VPP config for the dnsd integration test VM.
#
# Only what dnsd needs:
#   - dpdk on the bridge-side NIC (ens4, PCI 0000:00:04.0) for
#     dataplane ingress. uio_pci_generic is the kernel driver we
#     rebind it to — doesn't need IOMMU (unlike vfio-pci), kernel
#     module ships with stock Debian.
#   - Session layer + use-app-socket-api so vcl-rs can init.
#   - CLI + API sockets at well-known paths for the tests and for
#     configure-vpp.sh to bind the default app-namespace.
#
# The NIC rebind (virtio-net → uio_pci_generic) happens in
# vpp-test.service's ExecStartPre.
#

unix {
  nodaemon
  cli-listen /run/vpp/cli.sock
  gid vpp
  exec /etc/vpp/commands.txt
}

api-segment {
  gid vpp
}

socksvr {
  socket-name /run/vpp/api.sock
  default
}

cpu {
  main-core 0
}

plugins {
  plugin dpdk_plugin.so    { enable }
  plugin af_xdp_plugin.so  { disable }
  # Silence the plugin-not-found warning noise from plugins that
  # expect acl_plugin and friends.
  plugin acl_plugin.so     { disable }
  plugin nat_plugin.so     { disable }
  plugin nat64_plugin.so   { disable }
  plugin ct6_plugin.so     { disable }
  plugin det44_plugin.so   { disable }
  plugin abf_plugin.so     { disable }
  plugin dhcp_plugin.so    { disable }
  plugin linux_cp_plugin.so { disable }
  plugin linux_nl_plugin.so { disable }
  plugin cnat_plugin.so    { disable }
}

statseg {
  socket-name /run/vpp/stats.sock
}

# Session layer — vcl-rs (and therefore dnsd) needs use-app-socket-api
# and evt_qs_memfd_seg. Without these dnsd crashes in VclApp::init.
session {
  enable
  use-app-socket-api
  evt_qs_memfd_seg
}

dpdk {
  # ens4's PCI address on q35 with our launch.sh's device order.
  # If QEMU's slot assignment ever changes this will need to follow;
  # configure-vpp.sh also has the path hard-coded.
  dev 0000:00:04.0 {
    name wan
  }
  # Don't try to probe every device — just the one we hand over.
  no-multi-seg
}

buffers {
  buffers-per-numa 32768
  default data-size 2048
}
