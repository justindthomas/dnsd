vcl {
  # Must match VPP's session { use-app-socket-api } default path.
  app-socket-api /run/vpp/app_ns_sockets/default
  # Required for vcl-rs's Tokio integration — without this
  # vppcom_mq_epoll_fd returns -1.
  use-mq-eventfd
  # DNS messages are at most 64KB over TCP, 4KB over UDP (with EDNS).
  # The recursor churns through many ephemeral sockets; oversized
  # fifos exhaust VPP's shared-memory segment (4MB × 2 × hundreds
  # of sessions wedges the session layer under iterative load).
  rx-fifo-size 131072
  tx-fifo-size 131072
  app-scope-local
  app-scope-global
}
